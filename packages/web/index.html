<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#FFF8E7" />
    <meta name="color-scheme" content="light" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="he_IL" />
    <meta property="og:site_name" content="דובילנד" />
    <meta property="og:title" content="דובילנד — לומדים עברית בכיף" />
    <meta property="og:description" content="פלטפורמת למידה ישראלית לילדים בגילאי 3-7. משחקי אותיות, מספרים וקריאה בעברית." />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="דובילנד — לומדים עברית בכיף" />
    <meta name="twitter:description" content="פלטפורמת למידה ישראלית לילדים בגילאי 3-7. משחקי אותיות, מספרים וקריאה בעברית." />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <title>דובילנד — לומדים עברית בכיף</title>

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "דובילנד",
      "alternateName": "Dubiland",
      "url": "https://dubiland.co.il",
      "description": "פלטפורמת למידה ישראלית לילדים בגילאי 3-7. משחקי אותיות, מספרים וקריאה בעברית.",
      "applicationCategory": "EducationalApplication",
      "operatingSystem": "Web",
      "inLanguage": "he",
      "audience": {
        "@type": "EducationalAudience",
        "educationalRole": "student",
        "suggestedMinAge": 3,
        "suggestedMaxAge": 7
      },
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "ILS"
      }
    }
    </script>
  </head>
  <body>
    <!-- GitHub Pages SPA redirect: restore path from query string set by 404.html -->
    <script>
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      }(window.location))
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
